  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', Helvetica, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #1a1a2e;
      color: white;
      text-align: center;
      padding: 20px;
    }
    h1 { font-size: 2.5em; margin-bottom: 10px; }
    p { color: #aaa; font-size: 1.1em; max-width: 500px; text-wrap: balance; }
    a { color: #2E75B6; text-decoration: none; }

    .game-card {
      margin-top: 2.5rem;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 1.5rem 2rem;
      max-width: 340px;
      background: rgba(255,255,255,0.04);
      text-decoration: none;
      display: block;
      transition: border-color 0.2s;
      text-wrap: balance;
    }
    .game-card:hover { border-color: rgba(124,108,240,0.5); }
    .game-card h2 {
      font-size: 1.2rem;
      font-weight: 700;
      color: white;
      margin-bottom: 0.4rem;
    }
    .game-card p {
      font-size: 0.9rem;
      color: #888;
      margin: 0;
    }
    .game-card .arrow {
      display: inline-block;
      margin-top: 1rem;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #7c6cf0;
    }

    .links {
      position: fixed;
      bottom: 20px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.9em;
    }
